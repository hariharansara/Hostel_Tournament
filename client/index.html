<!doctype html>
<html>
  <head>
    <title>Tournament</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="portal-home">
    <div class="samurai-decor" aria-hidden="true"></div>
    <div class="theme-layer" aria-hidden="true"></div>
    <div class="theme-grid" aria-hidden="true"></div>
    <div class="theme-glow" aria-hidden="true"></div>
    <div class="sport-orbit" aria-hidden="true">
      <span class="orbit-dot dot-1"></span>
      <span class="orbit-dot dot-2"></span>
      <span class="orbit-dot dot-3"></span>
      <span class="orbit-dot dot-4"></span>
    </div>
    <h1 class="page-title">AMIGOZ 26"</h1>

    <div class="container">
      <div class="big-card" onclick="goToCategory('online')">
        <img src="assets/images/online.png" />
        <span>Online Games</span>
      </div>

      <div class="big-card" onclick="goToCategory('offline')">
        <img src="assets/images/offine.jpg" />
        <span>Offline Games</span>
      </div>
    </div>

    <script src="js/main.js"></script>
  </body>
</html>
